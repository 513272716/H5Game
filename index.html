<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的 H5 游戏中心</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(170deg, #fff7e6 0%, #ffe9f0 45%, #e3f6ff 100%);
      background-attachment: fixed;
      color: #5a4a55;
      min-height: 100%;
      padding: 28px 16px calc(28px + env(safe-area-inset-bottom));
    }

    /* 顶部标题 */
    header { text-align: center; margin-bottom: 28px; }
    header h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: .5px;
      color: #ff7eb3;
      text-shadow: 0 2px 0 #fff;
    }
    header p { margin-top: 8px; font-size: 15px; color: #9a8a94; }

    /* 游戏网格 */
    .grid {
      max-width: 820px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 20px;
    }

    /* 游戏卡片 */
    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 24px 18px 20px;
      border-radius: 28px;
      background: #ffffff;
      border: 2px solid #fff;
      box-shadow: 0 8px 20px rgba(255, 150, 180, 0.18);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: transform .18s ease, box-shadow .18s ease;
      overflow: hidden;
    }
    .card:active { transform: scale(0.96); }
    @media (hover: hover) {
      .card:hover {
        transform: translateY(-5px) rotate(-1deg);
        box-shadow: 0 14px 28px rgba(255, 130, 170, 0.32);
      }
    }

    .card .icon {
      width: 120px;
      height: 120px;
      border-radius: 28px;
      object-fit: cover;
      background: #fff3f8;
      box-shadow: 0 5px 14px rgba(255, 150, 180, 0.28);
      margin-bottom: 14px;
    }
    .card .name {
      font-size: 19px;
      font-weight: 800;
      color: #5a4a55;
      margin-bottom: 7px;
    }
    .card .desc {
      font-size: 13.5px;
      line-height: 1.55;
      color: #a99ba3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card .play-tag {
      margin-top: 14px;
      font-size: 13.5px;
      font-weight: 800;
      padding: 9px 24px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffb36b, #ff7eb3);
      color: #fff;
      box-shadow: 0 4px 10px rgba(255, 130, 170, 0.35);
    }

    /* 空状态提示 */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 20px;
      color: #b3a6ad;
      font-size: 14px;
      line-height: 1.8;
    }

    footer {
      margin-top: 32px;
      text-align: center;
      font-size: 12px;
      color: #c2b4bc;
    }

    /* ---------- 竖屏（窄屏手机）：保持两列且卡片够大 ---------- */
    @media (orientation: portrait) and (max-width: 480px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }
      .card { padding: 18px 12px 16px; }
      .card .icon { width: 96px; height: 96px; }
      .card .name { font-size: 17px; }
    }

    /* ---------- 横屏：屏幕矮而宽，压缩留白、放宽网格 ---------- */
    @media (orientation: landscape) {
      body { padding: 16px 24px calc(16px + env(safe-area-inset-bottom)); }
      header { margin-bottom: 18px; }
      header h1 { font-size: 26px; }
      header p { margin-top: 4px; }
      .grid {
        max-width: 1200px;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 18px;
      }
      .card { padding: 18px 14px 16px; }
      .card .icon { width: 104px; height: 104px; margin-bottom: 10px; }
      .card .play-tag { margin-top: 10px; }
      footer { margin-top: 22px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🍭 我的小游戏乐园</h1>
    <p>挑一个，开玩吧～</p>
  </header>

  <main class="grid" id="gameGrid"></main>

  <footer>© 2026 My H5 Games</footer>

  <!-- 游戏配置从 data.js 读取，要增删游戏请编辑 data.js -->
  <script src="data.js"></script>
  <script>
    const grid = document.getElementById('gameGrid');
    const list = (typeof GAMES !== 'undefined' && Array.isArray(GAMES)) ? GAMES : [];

    if (!list.length) {
      grid.innerHTML = '<div class="empty">还没有配置游戏<br>请在 data.js 里添加你的游戏</div>';
    } else {
      list.forEach(g => {
        const a = document.createElement('a');
        a.className = 'card';
        a.href = g.url;
        // 如需在新标签页打开，取消下面一行的注释：
        // a.target = '_blank';

        const img = document.createElement('img');
        img.className = 'icon';
        img.src = g.icon || '';
        img.alt = g.name || '游戏图标';
        img.loading = 'lazy';
        img.onerror = () => {
          img.src = 'data:image/svg+xml;utf8,' + encodeURIComponent(
            '<svg xmlns="http://www.w3.org/2000/svg" width="84" height="84"><rect width="84" height="84" rx="22" fill="%23fff3f8"/><text x="42" y="54" font-size="38" text-anchor="middle">🎮</text></svg>'
          );
        };

        const name = document.createElement('div');
        name.className = 'name';
        name.textContent = g.name || '未命名游戏';

        const desc = document.createElement('div');
        desc.className = 'desc';
        desc.textContent = g.desc || '';

        const tag = document.createElement('div');
        tag.className = 'play-tag';
        tag.textContent = '开始游戏';

        a.append(img, name, desc, tag);
        grid.appendChild(a);
      });
    }
  </script>
</body>
</html>
